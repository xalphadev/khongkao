services:

  # ── Next.js Application ────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/prod.db
      NEXTAUTH_URL: https://khongkao.xalpha.co.th
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - db_data:/app/data          # SQLite database persistent storage
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Nginx Reverse Proxy ────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # place your SSL certs here
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

# ── Volumes ────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── Networks ───────────────────────────────────
networks:
  internal:
    driver: bridge

services:

  # ── Next.js Application ────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"    # เข้าถึงได้เฉพาะ localhost (Caddy proxy)
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/prod.db
      NEXTAUTH_URL: https://khongkao.xalpha.co.th
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - db_data:/app/data          # SQLite database persistent storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

# ── Volumes ────────────────────────────────────
volumes:
  db_data:
    driver: local

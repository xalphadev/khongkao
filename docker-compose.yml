services:

  # ── Next.js Application ────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/prod.db
      NEXTAUTH_URL: https://khongkao.xalpha.co.th
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - db_data:/app/data
    networks:
      - internal
      - caddy_proxy            # shared network กับ Caddy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

# ── Volumes ────────────────────────────────────
volumes:
  db_data:
    driver: local

# ── Networks ───────────────────────────────────
networks:
  internal:
    driver: bridge
  caddy_proxy:
    external: true             # สร้างไว้แล้วบนเซิร์ฟเวอร์

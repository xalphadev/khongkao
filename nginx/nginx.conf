# ─────────────────────────────────────────────────────────────
#  Nginx config for: khongkao.xalpha.co.th
#
#  SSL options:
#   A) Cloudflare (recommended) — leave HTTPS 443 block as-is
#      and set Cloudflare to "Full (strict)" SSL mode.
#   B) Self-managed cert — place cert.pem + key.pem in nginx/ssl/
#      and uncomment the 443 block below.
# ─────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name khongkao.xalpha.co.th;

    # Allow Let's Encrypt challenge if needed
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    http2  on;
    server_name khongkao.xalpha.co.th;

    # ── SSL Certificates ──────────────────────────
    # Option A: Cloudflare Origin Certificate (or any CA cert)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    client_max_body_size 20M;

    # ── Proxy to Next.js ──────────────────────────
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_cache_bypass  $http_upgrade;
    }

    # ── Static assets cache ───────────────────────
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
